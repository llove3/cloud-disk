spring.application.name=cloud-disk
spring.datasource.url=jdbc:mysql://localhost:3306/cloud_disk?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=1111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.clouddisk.entity

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
