<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 100px; }
        input { margin: 10px; padding: 8px; width: 200px; }
        button { padding: 8px 20px; }
        .error { color: red; }
    </style>
</head>
<body>
<h2>用户登录</h2>
<form id="loginForm">
    <input type="text" id="username" placeholder="用户名" required><br>
    <input type="password" id="password" placeholder="密码" required><br>
    <button type="submit">登录</button>
</form>
<p>没有账号？ <a href="/register">立即注册</a></p>
<p id="message" class="error"></p>

<script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const resp = await fetch("/api/user/login?username=" + username + "&password=" + password, {
            method: "POST"
        });
        const text = await resp.text();
        if (text === "登录成功") {
            window.location.href = "/files";
        } else {
            document.getElementById("message").innerText = text;
        }
    });
</script>
</body>
</html>
