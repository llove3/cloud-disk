<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>文件分享</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 80px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        input { padding: 8px; width: 200px; margin: 10px; }
        button { padding: 8px 20px; }
        .error { color: red; }
    </style>
</head>
<body>
<div class="container">
    <h2>文件分享</h2>
    <p id="fileName">加载中...</p>
    <div id="pwdSection" style="display:none;">
        <input type="text" id="password" placeholder="请输入提取码">
        <br>
    </div>
    <button id="downloadBtn">下载文件</button>
    <p id="message" class="error"></p>
</div>

<script>
    const path = window.location.pathname;
    const code = path.split('/').pop();

    document.getElementById('downloadBtn').onclick = async () => {
        const password = document.getElementById('password')?.value || '';
        const resp = await fetch('/s/' + code + '/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'password=' + encodeURIComponent(password)
        });

        if (resp.ok) {
            const blob = await resp.blob();
            const disposition = resp.headers.get('Content-Disposition');
            let filename = 'file';
            if (disposition && disposition.indexOf('filename*=') !== -1) {
                const match = disposition.match(/filename\*=UTF-8''([^;]+)/);
                if (match) filename = decodeURIComponent(match[1]);
            } else if (disposition && disposition.indexOf('filename=') !== -1) {
                const match = disposition.match(/filename="?([^";]+)"?/);
                if (match) filename = match[1];
            }

            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
        } else {
            const text = await resp.text();
            document.getElementById('message').innerText = text || '下载失败';
        }
    };

    (async function checkNeedPwd() {
        try {
            const testResp = await fetch('/s/' + code + '/verify', { method: 'POST', body: '' });
            if (testResp.status === 400) {
                const text = await testResp.text();
                if (text.includes('提取码')) {
                    document.getElementById('pwdSection').style.display = 'block';
                }
                document.getElementById('fileName').innerText = '该分享需要提取码';
            } else {
                document.getElementById('fileName').innerText = '点击下载按钮获取文件';
            }
        } catch (e) {
            document.getElementById('fileName').innerText = '获取分享信息失败';
        }
    })();
</script>
</body>
</html>
