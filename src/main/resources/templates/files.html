<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的网盘</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { margin-right: 10px; cursor: pointer; }
        .upload-area { margin: 20px 0; }
    </style>
</head>
<body>
<div class="header">
    <h2>我的网盘</h2>
    <div>
        <span th:text="${session.user.username}"></span> 你好
        <a href="/recycle">回收站</a> |
        <a href="/api/user/logout">退出</a>
    </div>
</div>

<div class="upload-area">
    <input type="file" id="fileInput">
    <button id="uploadBtn">上传文件</button>
    <span id="uploadMsg"></span>
</div>

<table id="fileTable">
    <thead>
    <tr><th>文件名</th><th>大小</th><th>上传时间</th><th>操作</th></tr>
    </thead>
    <tbody id="fileList"></tbody>
</table>

<script>
    function formatSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return (bytes / Math.pow(k, i)).toFixed(2) + ' ' + sizes[i];
    }

    function loadFileList() {
        fetch('/api/file/list')
            .then(res => res.json())
            .then(files => {
                const tbody = document.getElementById('fileList');
                tbody.innerHTML = '';
                files.forEach(file => {
                    const row = tbody.insertRow();
                    row.insertCell(0).innerText = file.fileName;
                    row.insertCell(1).innerText = formatSize(file.fileSize);
                    row.insertCell(2).innerText = new Date(file.createdAt).toLocaleString();
                    const actions = row.insertCell(3);

                    const downloadBtn = document.createElement('button');
                    downloadBtn.innerText = '下载';
                    downloadBtn.onclick = () => {
                        window.location.href = '/api/file/download?fileId=' + file.id;
                    };

                    const versionsBtn = document.createElement('button');
                    versionsBtn.innerText = '版本';
                    versionsBtn.onclick = () => {
                        fetch('/api/file/versions?fileId=' + file.id)
                            .then(res => res.json())
                            .then(versions => {
                                if (!versions || versions.length === 0) {
                                    alert('暂无历史版本');
                                    return;
                                }
                                let msg = '历史版本列表：\n';
                                versions.forEach(v => {
                                    msg += '版本 ' + v.versionNumber + '：' + v.fileName + '，大小 ' + formatSize(v.fileSize) + '，时间 ' + new Date(v.createdAt).toLocaleString() + '\n';
                                });
                                msg += '\n输入版本号进行回滚：';
                                const inputVer = prompt(msg);
                                if (inputVer && !isNaN(inputVer)) {
                                    fetch('/api/file/rollback?fileId=' + file.id + '&version=' + inputVer, { method: 'POST' })
                                        .then(res => res.text())
                                        .then(msg => {
                                            alert(msg);
                                            loadFileList();
                                        });
                                }
                            });
                    };

                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerText = '删除';
                    deleteBtn.onclick = () => {
                        fetch('/api/file/delete?fileId=' + file.id, { method: 'POST' })
                            .then(() => loadFileList());
                    };

                    actions.appendChild(downloadBtn);
                    actions.appendChild(versionsBtn);
                    actions.appendChild(deleteBtn);
                });
            });
    }

    document.getElementById('uploadBtn').onclick = () => {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        if (!file) {
            alert('请选择文件');
            return;
        }
        const formData = new FormData();
        formData.append('file', file);
        fetch('/api/file/upload', { method: 'POST', body: formData })
            .then(res => res.text())
            .then(msg => {
                document.getElementById('uploadMsg').innerText = msg;
                if (msg === '上传成功') {
                    loadFileList();
                    fileInput.value = '';
                }
            });
    };

    loadFileList();
</script>
</body>
</html>
